name: "Single-Cloud Patching Selector"

env:
  # AWS Configuration
  AWS_REGION: "ap-south-1"
  AWS_TAG_KEY: "OS"
  AWS_TAG_VALUE_UBUNTU: "Ubuntu"
  AWS_TAG_VALUE_WINDOWS: "Windows"
  # Azure Configuration


on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Cloud Provider'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - AWS
          - Azure
          - BOTH
      os_type:
        description: 'Select OS Type'
        required: true
        default: 'BOTH'
        type: choice
        options:
          - Ubuntu
          - Windows
          - BOTH

permissions:
  id-token: write
  contents: read

jobs:
  # --- AWS EXECUTION BLOCK ---
  patch-aws:
    name: "AWS Execution"
    # Execute if target_env is AWS or BOTH
    if: "${{ github.event.inputs.target_env == 'AWS' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS OIDC Login
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}


      - name: Patch AWS Ubuntu (with Watcher)
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding AWS Ubuntu VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU)..."
          SCRIPT_CONTENT=$(cat scripts/ubuntu/patch.sh)
          COMMANDS_JSON=$(jq -n --arg cmd "apt-get update && apt list --upgradable" '[$cmd]')
          
          CHECK_RESPONSE=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_UBUNTU" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Check Updates for Ubuntu" \
            --output json)

          CHECK_COMMAND_ID=$(echo $CHECK_RESPONSE | jq -r '.Command.CommandId')
          REQUESTED_COUNT=$(echo $CHECK_RESPONSE | jq -r '.Command.RequestedCount')
          echo "Check command sent with ID: $CHECK_COMMAND_ID (Requested for $REQUESTED_COUNT targets)"

          if [ "$REQUESTED_COUNT" -eq 0 ]; then
            echo "Error: No targets matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU! (RequestedCount=0)"
            exit 1
          fi

          echo "Waiting for update check to complete..."
          while true; do
            CHECK_STATUS=$(aws ssm list-commands --command-id "$CHECK_COMMAND_ID" --query "Commands[0].Status" --output text)
            if [[ "$CHECK_STATUS" == "Success" ]]; then
              break
            elif [[ "$CHECK_STATUS" == "Failed" || "$CHECK_STATUS" == "TimedOut" || "$CHECK_STATUS" == "Cancelled" ]]; then
              echo "Update check failed with status: $CHECK_STATUS"
              exit 1
            fi
            sleep 10
          done

          echo "Phase 2: Checking if updates are available..."
          UPDATES_FOUND=$(aws ssm get-command-invocation --command-id "$CHECK_COMMAND_ID" --instance-id "$(aws ec2 describe-instances --filters "Name=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_UBUNTU" --query 'Reservations[0].Instances[0].InstanceId' --output text)" --query 'StandardOutputContent' 2>/dev/null | grep -ci "upgradable" || echo "0")
          
          if [ "$UPDATES_FOUND" -gt 0 ] || [ -z "$UPDATES_FOUND" ]; then
            echo "Updates available - Installing patches on all Ubuntu targets..."
            COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
            
            RESPONSE=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_UBUNTU" \
              --parameters "{\"commands\":$COMMANDS_JSON}" \
              --comment "Selector Triggered Patching for Ubuntu" \
              --output json)

            COMMAND_ID=$(echo $RESPONSE | jq -r '.Command.CommandId')
            echo "Patch command sent with ID: $COMMAND_ID"

            echo "Waiting for patching to complete on all instances..."
            while true; do
              STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
              echo "Current Status: $STATUS"
              
              if [[ "$STATUS" == "Success" ]]; then
                echo "All Ubuntu VMs patched successfully!"
                exit 0
              elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
                echo "Patching failed with status: $STATUS"
                exit 1
              fi
              
              sleep 15
            done
          else
            echo "No updates available - All Ubuntu VMs are already on the latest version."
            exit 0
          fi


      - name: Patch AWS Windows (with Watcher)
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding AWS Windows VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS)..."
          SCRIPT_CONTENT=$(cat scripts/windows/patch.ps1)
          COMMANDS_JSON=$(jq -n --arg cmd "@(Get-WindowsUpdate -ListOnly).Count" '[$cmd]')
          
          CHECK_RESPONSE=$(aws ssm send-command \
            --document-name "AWS-RunPowerShellScript" \
            --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_WINDOWS" \
            --parameters "{\"commands\":$COMMANDS_JSON}" \
            --comment "Check Updates for Windows" \
            --output json)

          CHECK_COMMAND_ID=$(echo $CHECK_RESPONSE | jq -r '.Command.CommandId')
          REQUESTED_COUNT=$(echo $CHECK_RESPONSE | jq -r '.Command.RequestedCount')
          echo "Check command sent with ID: $CHECK_COMMAND_ID (Requested for $REQUESTED_COUNT targets)"

          if [ "$REQUESTED_COUNT" -eq 0 ]; then
            echo "Error: No targets matched the tag $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS! (RequestedCount=0)"
            exit 1
          fi

          echo "Waiting for update check to complete..."
          while true; do
            CHECK_STATUS=$(aws ssm list-commands --command-id "$CHECK_COMMAND_ID" --query "Commands[0].Status" --output text)
            if [[ "$CHECK_STATUS" == "Success" ]]; then
              break
            elif [[ "$CHECK_STATUS" == "Failed" || "$CHECK_STATUS" == "TimedOut" || "$CHECK_STATUS" == "Cancelled" ]]; then
              echo "Update check failed with status: $CHECK_STATUS"
              exit 1
            fi
            sleep 10
          done

          echo "Phase 2: Checking if updates are available..."
          UPDATES_FOUND=$(aws ssm get-command-invocation --command-id "$CHECK_COMMAND_ID" --instance-id "$(aws ec2 describe-instances --filters "Name=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_WINDOWS" --query 'Reservations[0].Instances[0].InstanceId' --output text)" --query 'StandardOutputContent' 2>/dev/null | grep -ciE '[1-9][0-9]*' || echo "0")
          
          if [ "$UPDATES_FOUND" -gt 0 ] || [ -z "$UPDATES_FOUND" ]; then
            echo "Updates available - Installing patches on all Windows targets..."
            COMMANDS_JSON=$(jq -n --arg cmd "$SCRIPT_CONTENT" '[$cmd]')
            
            RESPONSE=$(aws ssm send-command \
              --document-name "AWS-RunPowerShellScript" \
              --targets "Key=tag:$AWS_TAG_KEY,Values=$AWS_TAG_VALUE_WINDOWS" \
              --parameters "{\"commands\":$COMMANDS_JSON}" \
              --comment "Selector Triggered Patching for Windows" \
              --output json)

            COMMAND_ID=$(echo $RESPONSE | jq -r '.Command.CommandId')
            echo "Patch command sent with ID: $COMMAND_ID"

            echo "Waiting for patching to complete on all instances..."
            while true; do
              STATUS=$(aws ssm list-commands --command-id "$COMMAND_ID" --query "Commands[0].Status" --output text)
              echo "Current Status: $STATUS"
              
              if [[ "$STATUS" == "Success" ]]; then
                echo "All Windows VMs patched successfully!"
                exit 0
              elif [[ "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
                echo "Patching failed with status: $STATUS"
                exit 1
              fi
              
              sleep 15
            done
          else
            echo "No updates available - All Windows VMs are already on the latest version."
            exit 0
          fi


  # --- AZURE EXECUTION BLOCK ---
  patch-azure:
    name: "Azure Execution"
    # Execute if target_env is Azure or BOTH
    if: "${{ github.event.inputs.target_env == 'Azure' || github.event.inputs.target_env == 'BOTH' }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure OIDC Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Patch Azure Ubuntu (Discovery & Execution)
        # Execute if os_type is Ubuntu or BOTH
        if: "${{ github.event.inputs.os_type == 'Ubuntu' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding Azure Ubuntu VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU)"
          VM_LIST=$(az vm list --query "[?tags.$AWS_TAG_KEY=='$AWS_TAG_VALUE_UBUNTU'].{name:name, rg:resourceGroup}" -o json)
          VM_COUNT=$(echo "$VM_LIST" | jq '. | length')
          echo "Found $VM_COUNT matching VMs."

          if [ "$VM_COUNT" -gt 0 ]; then
            echo "Phase 2: Checking for available updates on all VMs..."
            UPDATES_AVAILABLE=false
            echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
              NAME=$(echo "$vm" | jq -r '.name')
              RG=$(echo "$vm" | jq -r '.rg')
              echo "Checking updates on VM: $NAME in $RG..."
              CHECK_OUTPUT=$(az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunShellScript --scripts "sudo apt-get update && apt list --upgradable" --query 'value[0].message' -o tsv 2>&1)
              if echo "$CHECK_OUTPUT" | grep -q "upgradable"; then
                echo "  ✓ Updates available on $NAME"
                UPDATES_AVAILABLE=true
              else
                echo "  ✓ No updates available on $NAME (already on latest version)"
              fi
            done
            
            if [ "$UPDATES_AVAILABLE" = true ]; then
              echo "Phase 3: Execution - Installing updates on all VMs and waiting for completion..."
              echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
                NAME=$(echo "$vm" | jq -r '.name')
                RG=$(echo "$vm" | jq -r '.rg')
                echo "Patching VM: $NAME in $RG..."
                az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunShellScript --scripts @scripts/ubuntu/patch.sh
                echo "Waiting for VM $NAME to complete updates..."
                sleep 30
              done
              echo "All Ubuntu VMs have been updated successfully!"
            else
              echo "Phase 3: No updates required - All Ubuntu VMs are already on the latest version."
            fi
          else
            echo "Error: No Ubuntu VMs found matching tag $AWS_TAG_KEY=$AWS_TAG_VALUE_UBUNTU! Resource discovery failed."
            exit 1
          fi


      - name: Patch Azure Windows (Discovery & Execution)
        # Execute if os_type is Windows or BOTH
        if: "${{ github.event.inputs.os_type == 'Windows' || github.event.inputs.os_type == 'BOTH' }}"
        run: |
          echo "Phase 1: Discovery - Finding Azure Windows VMs (Tag: $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS)"
          VM_LIST=$(az vm list --query "[?tags.$AWS_TAG_KEY=='$AWS_TAG_VALUE_WINDOWS'].{name:name, rg:resourceGroup}" -o json)
          VM_COUNT=$(echo "$VM_LIST" | jq '. | length')
          echo "Found $VM_COUNT matching VMs."

          if [ "$VM_COUNT" -gt 0 ]; then
            echo "Phase 2: Checking for available updates on all VMs..."
            UPDATES_AVAILABLE=false
            echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
              NAME=$(echo "$vm" | jq -r '.name')
              RG=$(echo "$vm" | jq -r '.rg')
              echo "Checking updates on VM: $NAME in $RG..."
              CHECK_OUTPUT=$(az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunPowerShellScript --scripts "@(Get-WindowsUpdate -ListOnly).Count" --query 'value[0].message' -o tsv 2>&1)
              if [ "$(echo $CHECK_OUTPUT | grep -oE '[0-9]+' | head -1)" -gt 0 ] 2>/dev/null; then
                echo "  ✓ Updates available on $NAME"
                UPDATES_AVAILABLE=true
              else
                echo "  ✓ No updates available on $NAME (already on latest version)"
              fi
            done
            
            if [ "$UPDATES_AVAILABLE" = true ]; then
              echo "Phase 3: Execution - Installing updates on all VMs and waiting for completion..."
              echo "$VM_LIST" | jq -c '.[]' | while read -r vm; do
                NAME=$(echo "$vm" | jq -r '.name')
                RG=$(echo "$vm" | jq -r '.rg')
                echo "Patching VM: $NAME in $RG..."
                az vm run-command invoke -g "$RG" -n "$NAME" --command-id RunPowerShellScript --scripts @scripts/windows/patch.ps1
                echo "Waiting for VM $NAME to complete updates..."
                sleep 30
              done
              echo "All Windows VMs have been updated successfully!"
            else
              echo "Phase 3: No updates required - All Windows VMs are already on the latest version."
            fi
          else
            echo "Error: No Windows VMs found matching tag $AWS_TAG_KEY=$AWS_TAG_VALUE_WINDOWS! Resource discovery failed."
            exit 1
          fi

