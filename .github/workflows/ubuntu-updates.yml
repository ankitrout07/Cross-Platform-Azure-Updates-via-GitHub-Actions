name: Ubuntu-AUM-Patching

on:
  workflow_dispatch: 

permissions:
  id-token: write
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Assess Ubuntu Patches
        run: |
          az vm assess-patches \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Ubuntu

      - name: Update System Packages (apt-get)
        run: |
          az vm run-command invoke \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Ubuntu \
            --command-id RunShellScript \
            --scripts "sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get upgrade -y"

      - name: Trigger AUM Linux
        run: |
          az vm install-patches \
            --resource-group CROSS-PLATFORM-UPDATE \
            --name Ubuntu \
            --maximum-duration PT4H \
            --reboot-setting IfRequired \
            --classifications-to-include-linux Critical Security